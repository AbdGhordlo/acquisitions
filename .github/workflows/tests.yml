name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          npm test 2>&1 | tee test-output.log
          echo "status=$?" >> "$GITHUB_OUTPUT"

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Summary" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.test.outputs.status }}" = "0" ]; then
            echo "- Status: ✅ Passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Status: ❌ Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "- Review test output and rerun locally with npm test." >> "$GITHUB_STEP_SUMMARY"
          fi
          if grep -q -E "All files|Statements|Branches|Functions|Lines" test-output.log 2>/dev/null; then
            echo "- Coverage details:" >> "$GITHUB_STEP_SUMMARY"
            grep -E "All files|Statements|Branches|Functions|Lines" test-output.log | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          retention-days: 30

      - name: Fail if tests failed
        if: always()
        run: |
          if [ "${{ steps.test.outputs.status }}" != "0" ]; then
            echo "::error::Jest tests failed. See the workflow logs for details."
            exit 1
          fi
